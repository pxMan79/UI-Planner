services:
  ui-planner:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: ui-planner
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3217:3000"
    volumes:
      - ../../data:/app/data
    networks:
      - default
      - npm-net

networks:
  npm-net:
    external: true
    name: nginx-proxy-manager_npm-net
